<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purrbuddha's Blog</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 650px;
            margin: 0 auto;
            padding: 3rem 1.25rem;
            color: #1f2328;
            line-height: 1.6;
            background-color: #ffffff;
        }

        header h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 2rem;
            color: #0f172a;
            letter-spacing: -0.02em;
        }

        /* Scrollable List Area */
        .scroll-container {
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 0.5rem;
            scrollbar-width: thin;
            scrollbar-color: #d0d7de transparent;
        }

        .scroll-container::-webkit-scrollbar {
            width: 6px;
        }

        .scroll-container::-webkit-scrollbar-thumb {
            background-color: #d0d7de;
            border-radius: 3px;
        }

        .post-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .post-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0.85rem 0;
            border-bottom: 1px solid #f0f2f5;
        }

        .post-item a {
            color: #0969da;
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 500;
        }

        .post-item a:hover {
            text-decoration: underline;
        }

        .post-date {
            font-size: 0.85rem;
            color: #636c76;
            white-space: nowrap;
            margin-left: 1rem;
            font-variant-numeric: tabular-nums;
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            body {
                padding: 2rem 1rem;
            }

            .scroll-container {
                max-height: 70vh;
            }

            .post-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.2rem;
            }

            .post-date {
                margin-left: 0;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Purrbuddha's Blog</h1>
    </header>

    <main>
        <div class="scroll-container">
            <ul class="post-list">
                <li class="post-item">
                    <a href="posts/building-core-prototype.html">Building the Core Prototype</a>
                    <span class="post-date">Oct 24, 2026</span>
                </li>
                <li class="post-item">
                    <a href="posts/project-kickoff.html">Project Kickoff & Silo Setup</a>
                    <span class="post-date">Oct 15, 2026</span>
                </li>
            </ul>
        </div>
    </main>

</body>
</html>

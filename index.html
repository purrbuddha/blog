<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purrbuddha's Blog</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 600px;
            margin: 4rem auto;
            padding: 0 1rem;
            color: #24292e;
            line-height: 1.6;
            background-color: #5c1191;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: #4f1010;
        }

        .post-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .post-item {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 0.8rem 0;
            border-bottom: 1px solid #4f1010;
        }

        .post-item a {
            color: #4f1010;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .post-item a:hover {
            text-decoration: underline;
        }

        .post-date {
            font-size: 0.85rem;
            color: #4f1010;
            white-space: nowrap;
            margin-left: 1rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Purrbuddha's Blog</h1>
    </header>

    <main>
        <ul class="post-list">
            <!-- Add new posts at the top of this list -->
            <li class="post-item">
                <a href="posts/init_post.html">First Post</a>
                <span class="post-date">Oct 24, 2026</span>
            </li>
        </ul>
    </main>

</body>
</html>
